name: Daily Stock Data Update

# ───────────────────────────────────────────────────────────
# 매일 평일 한국 시장 마감(15:30 KST) 후 데이터 자동 수집
# - daily_update.py 4 STEP 실행 (종목/주가/재무/경고)
# - data_quality_check.py 9 CHECK 실행 후 보고서 Supabase 저장
# - 실패 시 GitHub Actions 메일 자동 발송 + Job summary 표시
# ───────────────────────────────────────────────────────────

on:
  schedule:
    # 평일(월~금) 09:30 UTC = 18:30 KST
    - cron: "30 9 * * 1-5"
  workflow_dispatch:           # 수동 실행 (Actions 탭의 Run workflow 버튼)
    inputs:
      mode:
        description: "실행 모드"
        required: true
        default: "full"
        type: choice
        options:
          - full          # 전체 (종목+주가+재무+경고+품질검사)
          - price-only    # 주가만
          - fin-only      # 재무만
          - warn-only     # 경고 재계산만
          - quality-only  # 품질 검사만

# 동시 실행 방지 (이전 실행이 끝나기 전 새 실행 무시)
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    name: Run daily update
    runs-on: ubuntu-latest
    timeout-minutes: 90              # 1회 실행 최대 90분 (5,000종목 기준 충분)

    env:
      TZ: Asia/Seoul                  # 로그 타임스탬프 KST 표시
      PYTHONUNBUFFERED: "1"
      # ── Supabase ──
      SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # ── DART OpenAPI ──
      DART_API_KEY:               ${{ secrets.DART_API_KEY }}

    steps:
      # 1) 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Python 설치
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # 3) 의존성 설치
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4) Secrets 존재 여부 사전 검증 (디버깅 편의)
      - name: Verify secrets
        run: |
          if [ -z "$SUPABASE_URL" ];              then echo "::error::SUPABASE_URL missing";              exit 1; fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then echo "::error::SUPABASE_SERVICE_ROLE_KEY missing"; exit 1; fi
          if [ -z "$DART_API_KEY" ];              then echo "::error::DART_API_KEY missing";              exit 1; fi
          echo "✅ All required secrets present"

      # 5) 모드 결정 (수동 실행 input 우선, 자동 실행은 full)
      - name: Determine run mode
        id: mode
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="full"; fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "🟢 Run mode: $MODE"

      # 6) daily_update.py 실행 (모드별 분기)
      - name: Run daily_update.py
        working-directory: backend/analysis
        run: |
          case "${{ steps.mode.outputs.mode }}" in
            full)
              python daily_update.py --no-quality
              ;;
            price-only)
              python daily_update.py --price-only --no-quality
              ;;
            fin-only)
              python daily_update.py --fin-only --no-quality
              ;;
            warn-only)
              python daily_update.py --warn-only --no-quality
              ;;
            quality-only)
              echo "Skipping daily_update — quality check only"
              ;;
          esac

      # 7) data_quality_check.py 별도 실행 (full / quality-only 일 때)
      - name: Run data_quality_check.py
        if: steps.mode.outputs.mode == 'full' || steps.mode.outputs.mode == 'quality-only'
        working-directory: backend/analysis
        run: python data_quality_check.py

      # 8) 실행 로그 아티팩트로 업로드 (7일 보관)
      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-update-logs-${{ github.run_id }}
          path: backend/analysis/logs/
          retention-days: 7
          if-no-files-found: ignore

      # 9) Job Summary 생성 (Actions 탭에서 결과 한눈에 확인)
      - name: Generate job summary
        if: always()
        working-directory: backend/analysis
        run: |
          {
            echo "## 📊 Daily Update Result"
            echo ""
            echo "- **Mode**: \`${{ steps.mode.outputs.mode }}\`"
            echo "- **Status**: ${{ job.status }}"
            echo "- **Triggered**: ${{ github.event_name }}"
            echo "- **Run time (KST)**: $(date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "### Latest log files"
            if [ -d logs ]; then
              ls -lh logs/ | tail -10 | awk '{print "- " $NF " (" $5 ")"}'
            fi
          } >> $GITHUB_STEP_SUMMARY

      # 10) 실패 시 명확한 에러 메시지
      - name: Failure notice
        if: failure()
        run: |
          echo "::error::Daily update failed. Check logs in Artifacts above."
          echo "Tip: re-run from Actions tab → 'Run workflow' button"

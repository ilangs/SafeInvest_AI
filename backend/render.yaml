# render.yaml
# Render.com 배포 설정 파일
# Render Dashboard → "Root Directory" = backend
# 이 파일의 모든 경로는 backend/ 기준 상대 경로입니다.

services:

  # ── 1. Web API 서버 ────────────────────────────────────────────
  - type: web
    name: safeinvest-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PYTHONPATH
        value: .
      - key: FASTAPI_ENV
        value: production
      - key: KIS_MOCK
        value: "true"
      # ── Render Dashboard → Environment 탭에서 수동 입력 ──
      # SUPABASE_URL
      # SUPABASE_ANON_KEY
      # SUPABASE_SERVICE_ROLE_KEY
      # SUPABASE_JWT_SECRET
      # OPENAI_API_KEY
      # FASTAPI_SECRET_KEY
      # ENCRYPTION_KEY
      # ALLOWED_ORIGINS=https://your-app.vercel.app,https://your-preview.vercel.app

  # ── 2. 일별 주식 데이터 수집 Cron Job ─────────────────────────
  # ※ GitHub Actions(.github/workflows/daily_update.yml) 로 대체 운영중.
  #   GitHub Actions = Public repo 무료 / Private repo 월 2,000분 무료.
  #   Render Cron 사용 시 비용 발생($7/월) → 비활성화.
  #
  #   Render Cron으로 다시 전환하려면 아래 블록 주석을 해제하고
  #   GitHub Actions 워크플로우는 비활성화하세요 (둘 다 켜면 중복 실행).
  #
  # - type: cron
  #   name: safeinvest-daily-collector
  #   runtime: python
  #   schedule: "30 9 * * 1-5"          # 평일 09:30 UTC = 18:30 KST
  #   buildCommand: pip install -r requirements.txt
  #   startCommand: python analysis/daily_update.py
  #   envVars:
  #     - key: PYTHON_VERSION
  #       value: "3.12.0"
  #     - key: PYTHONPATH
  #       value: .
  #     # ── Render Dashboard → Environment 탭에서 수동 입력 ──
  #     # SUPABASE_URL
  #     # SUPABASE_SERVICE_ROLE_KEY  ← daily_update.py 가 RLS 우회용으로 사용
  #     # DART_API_KEY               ← OpenDartReader 재무 수집용

# render.yaml
# Render.com 배포 설정 파일
# 이 파일을 git 루트에 두면 Render 가 자동으로 읽습니다.

services:
  - type: web
    name: safeinvest-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: PYTHONPATH
        value: .
      - key: FASTAPI_ENV
        value: production
      - key: KIS_MOCK
        value: "true"
      # 아래 항목은 Render Dashboard → Environment 탭에서 수동 입력
      # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
      # SUPABASE_JWT_SECRET, OPENAI_API_KEY
      # KIS_APP_KEY, KIS_APP_SECRET, KIS_ACCOUNT
      # FASTAPI_SECRET_KEY
    healthCheckPath: /health
